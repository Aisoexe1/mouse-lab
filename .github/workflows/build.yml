name: Build Windows EXE

on:
  push:
    branches: [ master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GLFW via vcpkg
        run: |
          vcpkg install glfw3:x64-windows
          vcpkg integrate install

      - name: Configure CMake
        run: |
          cmake -B build -S native `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Package release zip
        run: |
          mkdir release
          copy build\Release\mouse_test_injector_gui.exe release\
          xcopy weapons release\weapons\ /E /I /Q
          Compress-Archive -Path release\* -DestinationPath macro-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macro-windows
          path: macro-windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: macro-windows.zip
          make_latest: true
